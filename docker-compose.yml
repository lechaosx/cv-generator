services:
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data

  backend:
    build:
      context: backend
      target: dev
    environment:
      OPENAI_KEY: /run/secrets/openai_key
    secrets:
      - openai_key
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - redis

  caddy:
    image: caddy:alpine
    ports:
      - 80:80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - backend

volumes:
  redis-data:

secrets:
  openai_key:
    file: ./secrets/openai_key
