services:
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data

  backend:
    build:
      context: backend
      target: dev
    environment:
      OPENAI_KEY: /run/secrets/openai_key
      DOMAINS_CONFIG: ${DOMAINS_CONFIG:-/config/domains.json}
      DEFAULT_CV: /data/default.yaml
    secrets:
      - openai_key
    volumes:
      - ./backend/src:/app/src
      - ./config/domains.json:/config/domains.json:ro
      - ${DEFAULT_CV:-./data/cv.yaml}:/data/default.yaml:ro
    depends_on:
      - redis

  caddy:
    image: caddy:alpine
    ports:
      - 80:80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - backend

volumes:
  redis-data:

secrets:
  openai_key:
    file: ./secrets/openai_key
