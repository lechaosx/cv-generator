services:
  backend:
    image: ghcr.io/lechaosx/cv-generator/cv-generator:prod
    environment:
      DOMAINS_CONFIG: /config/domains.json
    volumes:
      - diskcache:/data
    configs:
      - source: domains
        target: /config/domains.json
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:5000/healthz\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      restart_policy:
        condition: any

  caddy:
    image: caddy:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  diskcache:
  caddy-data:

configs:
  domains:
    file: ./config/domains.json
  caddyfile:
    file: ./Caddyfile.prod
