services:
  redis:
    image: redis:latest
    volumes:
      - redis-data-prod:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  backend:
    image: ghcr.io/lechaosx/cv-generator/cv-generator:prod
    environment:
      OPENAI_KEY: /run/secrets/openai_key
      DOMAINS_CONFIG: /config/domains.json
    secrets:
      - openai_key
    configs:
      - source: domains
        target: /config/domains.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      restart_policy:
        condition: any

  caddy:
    image: caddy:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  redis-data-prod:
  caddy-data:

configs:
  domains:
    file: ./config/domains.json
  caddyfile:
    file: ./Caddyfile.prod

secrets:
  openai_key:
    file: ./openai_key
